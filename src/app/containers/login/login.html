<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <img class="brand-icon" src="ick-logo.svg" alt="Ice Cross Kids logo" />
      <h1 class="login-brand-name">Ice Cross</h1>
    </div>

    <p class="login-subtitle">Panel administracyjny</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nazwa użytkownika</mat-label>
        <input matInput formControlName="username" autocomplete="username" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Hasło</mat-label>
        <input matInput type="password" formControlName="password" autocomplete="current-password" />
      </mat-form-field>

      @if (errorMessage) {
        <p class="error-message">{{ errorMessage }}</p>
      }

      <button mat-flat-button type="submit" class="login-btn">Zaloguj się</button>
    </form>
  </div>
</div>
